<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Mushroom Search</title>
    </head>

    <body>
        <h1> Click on the drop-down below to see a different kind of mushroom.</h1>
    <p> 
        <select id="mushroom-dropdown">
            <option value="">select a mushroom... </option>
        </select>
    </p>  

    <p> 
        <img id="mushroom-image" src="devils tooth.jpg" alt="Mushroom placeholder" width="500" height="500">
    </p>    

    <script>
         const mushrooms = [
         {
            "id": "1",
            "name": "Devil's tooth",
            "imgUrl": "devils tooth.jpg"
         },
         {
            "id": "2",
            "name": "Turkey tail",
            "imgUrl": "turkey tail.jpg"
        },
        {
            "id": "3",
            "name": "Lion's mane",
            "imgUrl": "lions mane.png"
        }        
     ];

    const dropdown = document.getElementById('mushroom-dropdown');
    const mushroomImage = document.getElementById('mushroom-image');

     function populatemushrooms() {
        mushrooms.forEach(mushroom => {
            const option = document.createElement('option');
            option.value = mushroom.id;
            option.textContent = mushroom.name;
            dropdown.appendChild(option);
        });
     }

     dropdown.addEventListener('change', (event) => {
        const selectedId = event.target.value;
        const foundMushroom = mushrooms.find(m => m.id === selectedId);

        if (foundMushroom) { 
            mushroomImage.src = foundMushroom.imgUrl;
            mushroomImage.alt = foundMushroom.name;
        }
     });
     
     populatemushrooms();
     
    </script>
    </body>
</html>
